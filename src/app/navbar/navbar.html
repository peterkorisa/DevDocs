<nav class="navbar">
  <div class="search-container">
    <input
      type="text"
      class="search-bar"
      placeholder="Search articles..."
      [(ngModel)]="searchQuery"
      (keyup)="onSearchChange()"
    />
  </div>
  <button 
    class="theme-toggle" 
    (click)="toggleTheme()"
    [attr.aria-label]="'Switch to ' + (currentTheme === 'light' ? 'dark' : 'light') + ' mode'"
  >
    {{ currentTheme === 'light' ? '🌙' : '☀️' }}
  </button>
</nav>
